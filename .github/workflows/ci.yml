name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: set up python
        run: uv python install 3.11

      - name: sync deps
        run: uv sync --all-extras

      - name: lint
        run: uv run ruff check src tests

      - name: tests
        run: uv run pytest -q
