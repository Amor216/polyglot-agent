# Place this file at ~/.polyglot/config.toml (or set POLYGLOT_CONFIG to its path).
# Every key below is optional.

[tools]
# If 'enabled' is set, ONLY the listed tools are registered. Omit to register all.
# enabled = ["read_file", "list_dir", "run_command"]

# 'disabled' always wins over 'enabled'.
# disabled = ["browser_screenshot"]

[commands]
# Extra command prefixes treated as safe in addition to the built-in allowlist.
# allowed = ["docker ps", "docker inspect", "kubectl get"]

# Command prefixes that are always blocked, even if they would otherwise match the allowlist.
# blocked = ["sudo", "su -"]

# External MCP servers exposed as tools. Each server contributes one tool per remote tool,
# named "<server>__<remote-name>" so collisions across servers are impossible.
# [[mcp.servers]]
# name = "db"
# command = "uvx"
# args = ["--from", "git+https://github.com/Amor216/db-mcp-server", "db-mcp"]
#
# [[mcp.servers]]
# name = "weather"
# command = "node"
# args = ["/path/to/weather-mcp/index.js"]
# env = { API_KEY = "..." }
